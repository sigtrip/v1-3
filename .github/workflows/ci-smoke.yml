name: CI Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 libportaudio-dev python3-dev libgl1-mesa-glx xvfb

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Quick syntax check
        run: |
          python -m compileall -q src main.py

      - name: Headless smoke boot
        run: |
          set +e
          timeout 25s python main.py --no-gui
          code=$?
          if [ "$code" -eq 0 ] || [ "$code" -eq 124 ]; then
            echo "Smoke boot passed (exit=$code)"
            exit 0
          fi
          echo "Smoke boot failed (exit=$code)"
          exit "$code"
