name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Линтинг и проверка типов ────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pip-audit

      - name: Security audit (pip-audit)
        run: pip-audit --desc

      - name: Black (check)
        run: black --check --diff src/ tests/

      - name: isort (check)
        run: isort --check-only --diff src/ tests/

      - name: Flake8
        run: flake8 src/ --max-line-length=120 --extend-ignore=E203,W503

      - name: Mypy
        run: mypy src/ --ignore-missing-imports

  # ── Тесты ───────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Syntax check
        run: python -m compileall -q src main.py

      - name: Health check
        run: python health_check.py

      - name: Run tests with coverage
        run: pytest -q --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  # ── Smoke boot ──────────────────────────────────────────
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Headless smoke boot
        run: |
          set +e
          timeout 25s python main.py --no-gui
          code=$?
          if [ "$code" -eq 0 ] || [ "$code" -eq 124 ]; then
            echo "Smoke boot passed (exit=$code)"
            exit 0
          fi
          echo "Smoke boot failed (exit=$code)"
          exit "$code"

  # ── Docker build ────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t argos:ci-${{ github.sha }} .

      - name: Test Docker image
        run: |
          docker run --rm argos:ci-${{ github.sha }} python -c "from src.core import ArgosCore; print('OK')"
