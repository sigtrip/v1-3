
name: 🤖 Argos Auto-Publish Skills to PyPI

on:
  push:
    branches: [main]
    paths:
      - 'src/skills/**.py'
  workflow_dispatch:
    inputs:
      skill_name:
        description: 'Имя навыка для публикации (без .py)'
        required: false
        default: ''

permissions:
  contents: write
  id-token: write

jobs:
  detect-skills:
    runs-on: ubuntu-latest
    outputs:
      skills: ${{ steps.changed.outputs.skills }}
      has_skills: ${{ steps.changed.outputs.has_skills }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect changed skills
        id: changed
        run: |
          if [ -n "${{ github.event.inputs.skill_name }}" ]; then
            SKILLS='["${{ github.event.inputs.skill_name }}"]'
            echo "skills=$SKILLS" >> $GITHUB_OUTPUT
            echo "has_skills=true" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'src/skills/*.py' | grep -v '__init__' | sed 's|src/skills/||;s|\.py$||' | jq -R . | jq -sc .)
            echo "skills=$CHANGED" >> $GITHUB_OUTPUT
            COUNT=$(echo $CHANGED | jq length)
            echo "has_skills=$([ $COUNT -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          fi

  train-model:
    runs-on: ubuntu-latest
    needs: detect-skills
    if: needs.detect-skills.outputs.has_skills == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install scikit-learn numpy requests
      - name: Train Argos own model
        run: |
          python -c "import sys; sys.path.insert(0, '.'); from src.argos_model import ArgosOwnModel; model = ArgosOwnModel(core=None); print(model.train())"
        continue-on-error: true
      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: argos-model
          path: data/argos_model/

  publish-skills:
    runs-on: ubuntu-latest
    needs: [detect-skills, train-model]
    if: needs.detect-skills.outputs.has_skills == 'true'
    strategy:
      matrix:
        skill: ${{ fromJson(needs.detect-skills.outputs.skills) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install tools
        run: pip install build twine
      - name: Build and publish ${{ matrix.skill }}
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -c "import sys; sys.path.insert(0, '.'); from src.pypi_publisher import ArgosPyPIPublisher; pub = ArgosPyPIPublisher(); print(pub.publish('${{ matrix.skill }}'))"
