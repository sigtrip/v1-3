name: Build ArgosUniversal EXE (Windows)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-optional.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          python build_exe.py

      - name: Verify EXE Existence
        shell: pwsh
        run: |
          if (Test-Path "dist/*.exe") {
              Write-Host "✅ EXE found in dist/"
              dir dist/
          } else {
              Write-Host "❌ EXE not found! Checking build folder for warnings/errors:"
              if (Test-Path "build/") { dir build/ }
              exit 1
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: argos-exe
          path: dist/*

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build/*
